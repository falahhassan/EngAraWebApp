<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Dictionary App</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/vconsole@3.15.1/dist/vconsole.min.js"></script>
    <script>
      var vConsole = new VConsole();
    </script>
  </head>
  <body>
    <div class="app-wrapper">
      <!-- HEADER -->
      <header class="main-header">
        <h1>📖 Dictionary</h1>
        <p>English ↔ Arabic | fast substring search</p>
      </header>

      <!-- MAIN CONTENT -->
      <main class="container">
        <div class="search-area">
          <input
            type="text"
            id="searchInput"
            placeholder="Search English word... e.g., 'hello', '10th'"
          />
          <button id="searchBtn">Search</button>
        </div>
        <div id="stats" class="stats"></div>
        <div id="results" class="results"></div>
      </main>

      <!-- FOOTER -->
      <footer class="main-footer">
        <p>© 2026 Simple Dictionary App</p>
        <p>By FHLabs Falah Hasan</p>
        <p>Contributors: Falah Hasan</p>
        <p>
          Contact: <a href="mailto:fahlabs13@gmail.com">fahlabs13@gmail.com</a>
        </p>
        <p>version: 1.0.0</p>
      </footer>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
